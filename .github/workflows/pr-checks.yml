name: PR Checks

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize]

env:
    CARGO_TERM_COLOR: always

jobs:
    rust:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: rust

            - name: Format check
              working-directory: rust
              run: cargo fmt --all -- --check

            - name: Clippy
              working-directory: rust
              run: cargo clippy --workspace --all-targets -- -D warnings
              continue-on-error: true # pedantic + nursery lints set to warn in workspace; shouldn't block PRs

            - name: Test
              working-directory: rust
              run: cargo test --workspace

            - name: Build (release)
              working-directory: rust
              run: cargo build --workspace --release

            # Catch crates.io packaging breakage (missing readme, bad metadata,
            # stray path/git deps, dirty-tree issues) before a real publish.
            # The actual publish lives in publish-crate.yml.
            - name: Publish dry-run (crates.io packaging)
              working-directory: rust
              run: cargo publish --dry-run -p smooai-smooth-operator-core --locked
