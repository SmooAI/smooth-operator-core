name: Release (Changesets 🦋)

on:
    workflow_dispatch:
    push:
        branches:
            - main

concurrency:
    group: release
    cancel-in-progress: false

env:
    CI: true

jobs:
    version:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
            actions: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GH_PAT }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'pnpm'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: pnpm install

            # ── Polyglot toolchains ──────────────────────────────────────────
            # ci:version (version step) syncs every manifest; ci:publish (publish
            # step) packs + pushes to crates.io / NuGet / PyPI / Go. Both run
            # inside the changesets/action step below, so every toolchain must be
            # present before it.
            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: '0.7.8'

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: rust

            - name: Version Update 🦋
              id: changesets
              uses: changesets/action@v1
              with:
                  version: pnpm ci:version
                  commit: '🦋 New version release'
                  title: '🦋 New version release'
                  publish: pnpm ci:publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_PAT }}
                  # Publish tokens for ci:publish — org-level secrets, same names
                  # the manual publish-*.yml workflows use.
                  NODE_AUTH_TOKEN: ${{ secrets.SMOOAI_NPM_TOKEN }}
                  NPM_CONFIG_PROVENANCE: 'true'
                  CARGO_REGISTRY_TOKEN: ${{ secrets.SMOOAI_CARGO_REGISTRY_TOKEN }}
                  NUGET_API_KEY: ${{ secrets.SMOOAI_NUGET_API_KEY }}
                  UV_PUBLISH_TOKEN: ${{ secrets.SMOOAI_PYPI_TOKEN }}

            - name: Auto-Merge Changeset PR
              run: |
                  PR_NUMBER=$(gh pr list --state open --head changeset-release/main --json number --jq '.[0].number')
                  if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
                    echo "Found Changeset PR #$PR_NUMBER, attempting to auto-merge..."
                    gh pr merge "$PR_NUMBER" --auto --squash
                  else
                    echo "No open Changeset PR found, skipping merge."
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}
